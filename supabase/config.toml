  # CRITICAL: s3-presign-upload validates the user in code (see index.ts).
  # It MUST stay verify_jwt=false so a transiently stale browser session
  # (e.g. session_not_found / expired refresh) can't gateway-401 every upload.
  # Removing this line silently re-introduces the "Edge Function returned a
  # non-2xx status code" upload outage. Do not delete.
  [functions.s3-presign-upload]
    verify_jwt = false
