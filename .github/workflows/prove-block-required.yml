name: PROVE BLOCK REQUIRED

# Phase R6 — Rule 1 enforcement: every PR that touches a judging surface must
# carry a fully-filled PROVE block in the PR body. Missing marker, missing
# section, or empty section ⇒ CI fails. Non-judging PRs are skipped.
#
# Judging surfaces watched:
#   - src/hooks/judging/**
#   - src/pages/Judge*.tsx, src/pages/judging/**
#   - src/lib/judging/**, src/lib/judgingApi.ts, src/lib/judgeAnonymizer.ts
#   - src/lib/perPhotoStatus.ts, src/lib/finalVoteTotals.ts, src/lib/exportJudgingResults.ts
#   - supabase/functions/** when path matches /(judg|round|placement|verification|cast-photo-vote|complete-round)/
#   - supabase/migrations/** when filename mentions judging keywords
#   - .lovable/memory/judging/**

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: read

jobs:
  prove:
    name: Enforce PROVE block on judging diffs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect judging-touching changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_SHA" --depth=1 || true
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED"

          MATCH=$(echo "$CHANGED" | grep -E '^(src/hooks/judging/|src/pages/Judge|src/pages/judging/|src/lib/judging/|src/lib/judgingApi\.ts|src/lib/judgeAnonymizer\.ts|src/lib/perPhotoStatus\.ts|src/lib/finalVoteTotals\.ts|src/lib/exportJudgingResults\.ts|\.lovable/memory/judging/)' || true)

          EDGE_MATCH=$(echo "$CHANGED" | grep -E '^supabase/functions/.*(judg|round|placement|verification|cast-photo-vote|complete-round).*' || true)

          MIG_MATCH=$(echo "$CHANGED" | grep -Ei '^supabase/migrations/.*(judg|round|placement|verification|vote|certificate|phase|coverage).*\.sql$' || true)

          if [ -n "$MATCH$EDGE_MATCH$MIG_MATCH" ]; then
            echo "judging=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=PROVE BLOCK::Judging surfaces touched — PROVE block required."
            echo "Matched files:"
            printf '%s\n' "$MATCH" "$EDGE_MATCH" "$MIG_MATCH" | sed '/^$/d'
          else
            echo "judging=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=PROVE BLOCK::No judging surfaces touched — skipping PROVE enforcement."
          fi

      - name: Validate PROVE block in PR body
        if: steps.detect.outputs.judging == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BODY="${PR_BODY:-}"

          fail() {
            echo "::error title=PROVE BLOCK REQUIRED::$1"
            exit 1
          }

          # Marker check
          echo "$BODY" | grep -q "BEGIN PROVE BLOCK" || fail "Missing 'BEGIN PROVE BLOCK' marker in PR description."
          echo "$BODY" | grep -q "END PROVE BLOCK"   || fail "Missing 'END PROVE BLOCK' marker in PR description."
          echo "$BODY" | grep -q "^## PROVE"          || fail "Missing '## PROVE' header in PR description."

          # Required section headers
          for section in \
            "### 1. SOW citation" \
            "### 2. Failing case (before)" \
            "### 3. Fix (line-by-line diff captured)" \
            "### 4. Passing case (after)" \
            "### 5. Forensic audit checklist" \
            "### 6. Author attestation"; do
            echo "$BODY" | grep -qF "$section" || fail "Missing section: '$section'"
          done

          # Extract PROVE block content for non-empty checks
          PROVE=$(printf '%s\n' "$BODY" | awk '/BEGIN PROVE BLOCK/{flag=1;next} /END PROVE BLOCK/{flag=0} flag')

          # Each numbered section must have non-comment, non-whitespace content beneath it.
          # Strategy: split on the section headers and check that every chunk has a non-empty,
          # non-HTML-comment, non-checkbox-only line.
          python3 - <<'PY'
          import os, re, sys
          body = os.environ.get("PR_BODY", "")
          m = re.search(r"BEGIN PROVE BLOCK(.*?)END PROVE BLOCK", body, re.S)
          if not m:
              print("::error::PROVE block markers missing"); sys.exit(1)
          block = m.group(1)

          sections = [
            "### 1. SOW citation",
            "### 2. Failing case (before)",
            "### 3. Fix (line-by-line diff captured)",
            "### 4. Passing case (after)",
          ]
          # Split block on section headers in order
          idx = []
          for s in sections:
              i = block.find(s)
              if i < 0:
                  print(f"::error::Missing section '{s}'"); sys.exit(1)
              idx.append((s, i))
          idx.append(("__END__", len(block)))

          def meaningful(text: str) -> bool:
              # Strip HTML comments
              text = re.sub(r"<!--.*?-->", "", text, flags=re.S)
              # Strip code fences emptiness placeholders
              lines = []
              for ln in text.splitlines():
                  s = ln.strip()
                  if not s: continue
                  if s.startswith("```"): continue
                  if s.startswith(sections[0][:4]): continue  # other headers
                  lines.append(s)
              # Need at least one substantive line >= 3 chars
              return any(len(l) >= 3 for l in lines)

          for i, (name, start) in enumerate(idx[:-1]):
              end = idx[i+1][1]
              chunk = block[start+len(name):end]
              if not meaningful(chunk):
                  print(f"::error title=PROVE BLOCK REQUIRED::Section '{name}' is empty. Fill it with proof (SQL row, edge response, or screenshot link).")
                  sys.exit(1)

          # Checklist: section 5 must have all 6 boxes ticked
          c5_start = block.find("### 5. Forensic audit checklist")
          c6_start = block.find("### 6. Author attestation")
          checklist = block[c5_start:c6_start] if c5_start >= 0 and c6_start > c5_start else ""
          ticked = len(re.findall(r"- \[[xX]\]", checklist))
          total  = len(re.findall(r"- \[[ xX]\]", checklist))
          if total < 6 or ticked < total:
              print(f"::error title=PROVE BLOCK REQUIRED::Forensic audit checklist incomplete ({ticked}/{total} ticked). Tick every box or justify in the section above.")
              sys.exit(1)

          # Attestation: section 6 must have its single box ticked
          attest = block[c6_start:]
          if not re.search(r"- \[[xX]\].*Claude", attest):
              print("::error title=PROVE BLOCK REQUIRED::Rule 5 attestation (section 6) is not ticked.")
              sys.exit(1)

          print("PROVE block valid.")
          PY

      - name: PROOF — print summary
        if: success() && steps.detect.outputs.judging == 'true'
        run: echo "::notice title=PROVE BLOCK::✅ PROVE block present, all sections filled, checklist complete, Rule 5 attested."
