name: Test Agent

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: test-agent-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # commit reports back
  issues: write         # open/close failure issues
  pull-requests: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install
        run: bun install --frozen-lockfile || bun install

      - name: Check admin gate (enabled + interval)
        id: gate
        env:
          SUPABASE_URL: https://isywidnfnjhtydmdfgtk.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzeXdpZG5mbmpodHlkbWRmZ3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDIyNDQsImV4cCI6MjA4NzUxODI0NH0.M2Kd2YQ9-D0koY68AX-AEXA2ry-kg53aDnFMY2G3jfQ
        run: |
          RESP=$(curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc/should_test_agent_run" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"p_trigger\":\"${GITHUB_EVENT_NAME:-schedule}\"}")
          echo "Gate response: $RESP"
          SHOULD=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).should_run?'true':'false')}catch{console.log('true')}})")
          echo "should_run=$SHOULD" >> $GITHUB_OUTPUT
          echo "## Test Agent Gate" >> $GITHUB_STEP_SUMMARY
          echo "\`$RESP\`" >> $GITHUB_STEP_SUMMARY

      - name: Run test agent
        if: steps.gate.outputs.should_run == 'true'
        id: agent
        env:
          TEST_AGENT_INGEST_TOKEN: ${{ secrets.TEST_AGENT_INGEST_TOKEN }}
        run: node scripts/test-agent/run-checks.mjs
        continue-on-error: true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: .lovable/test-reports/
          retention-days: 90

      - name: Commit reports back (push/schedule only, not PRs)
        if: always() && github.event_name != 'pull_request'
        run: |
          git config user.name "test-agent[bot]"
          git config user.email "test-agent[bot]@users.noreply.github.com"
          git add .lovable/test-reports/ || true
          if ! git diff --staged --quiet; then
            git commit -m "ci(test-agent): report ${{ github.run_id }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || echo "push failed (non-fatal)"
          fi

      - name: Open/update failure issue + email alert
        if: steps.agent.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: https://isywidnfnjhtydmdfgtk.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzeXdpZG5mbmpodHlkbWRmZ3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDIyNDQsImV4cCI6MjA4NzUxODI0NH0.M2Kd2YQ9-D0koY68AX-AEXA2ry-kg53aDnFMY2G3jfQ
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('.lovable/test-reports/latest.json','utf8'));
            const md = fs.readFileSync('.lovable/test-reports/latest.md','utf8');
            const errHash = require('crypto').createHash('md5')
              .update(JSON.stringify(report.failures.map(f=>f.check).sort())).digest('hex').slice(0,8);
            const title = `🚨 Test Agent failed [${errHash}]`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'test-agent'
            });
            const dup = existing.data.find(i => i.title.includes(`[${errHash}]`));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: dup.number,
                body: `Recurrence at ${report.ts}\n\n${md.slice(0,3000)}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title,
                body: md, labels: ['test-agent','automated']
              });
            }
            // Email via send-transactional-email
            try {
              const r = await fetch(`${process.env.SUPABASE_URL}/functions/v1/send-transactional-email`, {
                method: 'POST',
                headers: { apikey: process.env.SUPABASE_ANON_KEY, Authorization: `Bearer ${process.env.SUPABASE_ANON_KEY}`, 'Content-Type':'application/json' },
                body: JSON.stringify({
                  templateName: 'test-agent-alert',
                  to: report.health?.super_admin_email,
                  data: { errHash, status: report.status, failures: report.failures, ts: report.ts, runUrl: report.run_url }
                })
              });
              console.log('email status', r.status, await r.text());
            } catch(e) { console.error('email send failed', e.message); }

      - name: Auto-close green issues
        if: steps.agent.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'test-agent'
            });
            for (const i of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: i.number,
                body: `✅ Resolved at ${context.sha.slice(0,7)} — auto-closing.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: i.number, state: 'closed'
              });
            }

      - name: Fail job if checks failed
        if: steps.agent.outcome == 'failure'
        run: exit 1
