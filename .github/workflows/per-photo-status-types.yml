name: per-photo-status-types

# Phase 2 / D2 — single-source-of-truth typecheck for PerPhotoStatus.
#
# Runs `tsc --noEmit` over the full project on any PR that touches the
# union file or its known consumers. Any consumer that narrows the union
# illegally (e.g. drops `r1_needs_review` from a switch) will fail here
# BEFORE the dual-emit window closes in Phase 5.
on:
  pull_request:
    paths:
      - "src/lib/judging/perPhotoStatusTypes.ts"
      - "src/hooks/judging/usePhotoDecisions.ts"
      - "src/lib/perPhotoStatus.ts"
      - "src/lib/judging/participantStageLabels.ts"
      - "src/pages/SubmissionDetail.tsx"
      - "tsconfig*.json"
      - ".github/workflows/per-photo-status-types.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: tsc --noEmit (whole project)
        run: bunx tsc --noEmit
      - name: Run canonical↔legacy parity snapshot
        run: bunx vitest run src/test/per-photo-status-canonical-parity.spec.ts
