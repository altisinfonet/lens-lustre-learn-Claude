name: Android Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android-build.yml"
      - "ANDROID_BUILD_TRIGGER"

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Install Capacitor + native plugins
        run: |
          npm install --no-audit --no-fund \
            @capacitor/core @capacitor/cli @capacitor/android \
            @capacitor/camera @capacitor/share @capacitor/splash-screen \
            @capacitor/app @capacitor/browser \
            @capacitor-firebase/messaging

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Configure Android SDK and AGP versions
        run: |
          sed -i 's/minSdkVersion = 23/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/compileSdkVersion = 35/compileSdkVersion = 36/' android/variables.gradle
          sed -i -E 's/(com\.android\.tools\.build:gradle:)[0-9.]+/\18.9.1/' android/build.gradle

      - name: Set app version (monotonic versionCode from run number)
        run: |
          VC=$(( 1000 + ${{ github.run_number }} ))
          sed -i "s/versionCode 1/versionCode ${VC}/" android/app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.1.1"/' android/app/build.gradle
          echo "versionCode=${VC} versionName=1.1.1"
          grep -E "versionCode|versionName" android/app/build.gradle
          cat android/variables.gradle
          grep -n 'com.android.tools.build' android/build.gradle

      - name: Add OAuth deep-link intent filter (app.fiftymmretina scheme)
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          s = open(path).read()
          f = '''
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="app.fiftymmretina" />
                      </intent-filter>
          '''
          assert '</activity>' in s, 'activity tag not found'
          assert 'app.fiftymmretina' not in s, 'intent filter already present'
          s = s.replace('</activity>', f + '\n        </activity>', 1)
          open(path, 'w').write(s)
          print('Intent filter injected. MainActivity block:')
          print(s[s.index('<activity'):s.index('</activity>') + 12])
          EOF

      - name: Generate icons and splash screens
        run: |
          npm install --no-audit --no-fund -D @capacitor/assets
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0f172a' --splashBackgroundColor '#0f172a' || true

      - name: Place Firebase config
        run: cp google-services.json android/app/google-services.json

      - name: Sync web build into native project
        run: npx cap sync android

      - name: Build release bundle (unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload debug info on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            android/app/build/reports/
            android/build/reports/
          if-no-files-found: ignore
          retention-days: 3
