        name: Typecheck
 
# Real TypeScript type-check on every push/PR. The web build (vite) is
# transpile-only and the root tsconfig checks nothing, so this is the net that
# actually catches type errors in the app code.
 
on:
  push:
    branches: [main]
  pull_request:
 
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
 
      - name: TypeScript check (app)
        run: npx tsc --noEmit -p tsconfig.app.json
 
