name: RPC Contract Parity (Phase 6 / F7)

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'src/lib/judging/**'
      - 'src/test/rpc-consensus-vocabulary.spec.ts'
      - 'scripts/audits/rpc_contract_parity.mjs'
      - '.github/workflows/rpc-contract-parity.yml'

jobs:
  vocab-spec:
    name: Static vocabulary spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run vitest vocabulary spec
        run: bunx vitest run src/test/rpc-consensus-vocabulary.spec.ts

  live-rpc-parity:
    name: Live RPC parity audit
    runs-on: ubuntu-latest
    # Skip when secrets are unavailable (e.g. forked PRs).
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-save @supabase/supabase-js@^2.45.0
      - name: Run live RPC contract parity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/audits/rpc_contract_parity.mjs
