name: VOCAB SNAPSHOT (nightly)

# R6 — Refreshes docs/judging/vocabulary.source.json from the live database
# and opens a PR if the snapshot drifted. Keeps the generated
# docs/judging/vocabulary.md a true reflection of system_tag_decision_map.
#
# Manual trigger via workflow_dispatch is allowed for admins.
#
# Required repository secrets:
#   SUPABASE_URL                 — e.g. https://xxxxxxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    — service-role JWT (RLS bypass; nightly only)

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    name: Refresh vocabulary snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Snapshot live system_tag_decision_map → JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run vocab:snapshot

      - name: Regenerate vocabulary.md from snapshot
        run: bun run vocab:generate

      - name: Open PR if vocabulary changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(vocab): refresh judging vocabulary snapshot"
          title: "chore(vocab): nightly refresh of judging vocabulary"
          body: |
            Automated nightly snapshot of `system_tag_decision_map ⋈ judging_tags`.
            Drift detected vs. the committed JSON / markdown — see diff.
            Generated by `.github/workflows/vocabulary-snapshot.yml`.
          branch: chore/vocab-snapshot
          delete-branch: true
          add-paths: |
            docs/judging/vocabulary.source.json
            docs/judging/vocabulary.md
