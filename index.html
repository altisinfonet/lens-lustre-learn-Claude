    <link rel="preconnect" href="https://isywidnfnjhtydmdfgtk.supabase.co" />
    <link rel="dns-prefetch" href="https://isywidnfnjhtydmdfgtk.supabase.co" />
    <title>50mm Retina World — Competitions, Education & Journal for Photographers</title>
    <meta name="description" content="Join 50mm Retina World — the ultimate platform for photographers. Enter global competitions, master your craft through expert courses, and explore our photography journal.">
    <meta name="keywords" content="photography, competitions, photography courses, photo journal, wildlife photography, street photography, portrait photography, photography platform, 50mm Retina World">

    <meta property="og:type" content="website" />
    <meta property="og:title" content="50mm Retina World — Compete. Learn. Create.">
    <meta property="og:description" content="The ultimate photography community — global competitions, expert courses, and an inspiring journal. Join 10,000+ photographers.">

    <meta property="og:image" content="https://pub-f3e7af944f2746b7bb4fb6e679dd78de.r2.dev/site-assets/seo/1775321074863-k3b5rusybos.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="50mm Retina World — Compete. Learn. Create.">
    <meta name="twitter:description" content="The ultimate photography community — global competitions, expert courses, and an inspiring journal.">

    <!-- Structured data is injected by the app SEO layer -->
  </head>

  <body>
    <div id="root">
      <!-- Theme-aware loader background — must run before loader paints -->
      <script>
        (function(){try{var t=localStorage.getItem('theme');var d=t==='light'?false:true;window.__loaderBg=d?'hsl(222 47% 11%)':'hsl(209 40% 96%)'}catch(e){window.__loaderBg='hsl(222 47% 11%)'}})();
      </script>
      <!-- Single brand loader — visible until app signals ready -->
      <div id="init-loader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s ease">
        <img src="/images/logo-fallback.webp" alt="" width="140" height="140" style="opacity:.85;filter:drop-shadow(0 0 24px hsl(200 70% 50%/.45));animation:initPulse 2s ease-in-out infinite" />
        <span style="font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:hsl(220 10% 70%);font-family:system-ui">50mm Retina World</span>
      </div>
      <script>document.getElementById('init-loader').style.background=window.__loaderBg;</script>
      <style>@keyframes initPulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Init-loader is removed ONLY when the app explicitly calls window.__dismissLoader()
      // This prevents the "two loader" flash — no MutationObserver race condition
      window.__dismissLoader = function() {
        var el = document.getElementById('init-loader');
        if (!el) return;
        el.style.opacity = '0';
        el.style.pointerEvents = 'none';
        setTimeout(function() { el.remove(); }, 400);
      };
    </script>
  </body>
</html>
